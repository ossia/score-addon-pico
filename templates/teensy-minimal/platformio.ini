; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy31]
platform = teensy
board = teensy31
framework = arduino
build_flags = -std=gnu++2a -fconcepts -DWIFI -Wno-volatile -DTEENSY_31 -w
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-pico/templates/common
    -I @SCORE_SOURCE_DIR@/3rdparty/
    -I @SCORE_SOURCE_DIR@/3rdparty/Gamma
    -I @SCORE_SOURCE_DIR@/3rdparty/DSPFilters/include
    -I @SCORE_SOURCE_DIR@/3rdparty/DSPFilters/DSPFilters/include
    -I @SCORE_SOURCE_DIR@/3rdparty/DSPFilters
    -I @SCORE_SOURCE_DIR@/3rdparty/avendish/include
    -I @SCORE_SOURCE_DIR@/3rdparty/avendish/examples
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/boost_1_90_0
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/rnd/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/fmt/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/dno/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/tuplet/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/span/includede
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/mdspan/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/magic_enum/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/rnd/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/unordered_dense/include
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/span/include
    -I @SCORE_SOURCE_DIR@/src/plugins/score-plugin-fx
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/puara-gestures
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/puara-gestures/include
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/puara-gestures/3rdparty
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/puara-gestures/3rdparty/IMU_Sensor_Fusion
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/BioData
    -I @SCORE_SOURCE_DIR@/src/addons/score-addon-puara/3rdparty/extras
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/src
    -I @SCORE_SOURCE_DIR@/3rdparty/libossia/3rdparty/libremidi/include
build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17
